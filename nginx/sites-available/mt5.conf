# API Subdomain -> Port 80 (mt5-api)
server {
	listen      443 ssl;
	http2			on;
	listen      [::]:443 ssl;

    server_name mt5-api.yourdomain; # API Access

	ssl_certificate    sites-available/yourdomain.crt;
	ssl_certificate_key sites-available/private.key;

    access_log /var/log/nginx/mt5_api_access.log;
    error_log /var/log/nginx/mt5_api_error.log;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    location / {
        proxy_pass http://localhost$request_uri;
        include snippets/proxy_params.conf;
    }
}
